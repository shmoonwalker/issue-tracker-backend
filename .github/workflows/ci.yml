name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ticket_user
          POSTGRES_PASSWORD: ticket_password
          POSTGRES_DB: ticket_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ticket_user -d ticket_tracker"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RESEND_API_KEY: dummy-ci-key
      DB_URL: jdbc:postgresql://localhost:5432/ticket_tracker
      DB_USER: ticket_user
      DB_PASSWORD: ticket_password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - run: mvn clean verify
